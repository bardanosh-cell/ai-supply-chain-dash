<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Supply Chain Monitor</title>
<style>

:root{--bg:#07091f;--p1:#0c1035;--p2:#111840;--txt:#e8ecff;--mu:#8892cc;--gr:#2ecc87;--re:#ff4d6d;--bl:#4ea8ff;--yl:#fbbf24;--bo:#1e2a6a;--hd:#080d2e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--txt);}
.page{max-width:1800px;margin:0 auto;padding:20px 16px;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.topbar h1{font-size:18px;font-weight:700;}
.meta{font-size:12px;color:var(--mu);}
.ctrl{display:flex;gap:8px;flex-wrap:wrap;}
input,select,button{background:#0a0f30;color:var(--txt);border:1px solid var(--bo);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;}
input{cursor:text;} button:hover{background:#1a2260;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px;}
.card{background:linear-gradient(160deg,var(--p1),var(--p2));border:1px solid var(--bo);border-radius:12px;padding:14px;}
.card .lb{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;}
.card .vl{font-size:20px;font-weight:700;margin:6px 0 2px;}
.card .sb{font-size:11px;color:var(--mu);}
.g .vl{color:var(--gr);}.r .vl{color:var(--re);}.b .vl{color:var(--bl);}.y .vl{color:var(--yl);}
.layout{display:grid;grid-template-columns:1fr 380px;gap:16px;}
@media(max-width:1200px){.layout{grid-template-columns:1fr;}}
.tw{background:linear-gradient(160deg,var(--p1),var(--p2));border:1px solid var(--bo);border-radius:14px;overflow:hidden;}
.tb{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--bo);flex-wrap:wrap;gap:8px;}
.tb h2{font-size:14px;font-weight:600;}
.catbar{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--bo);flex-wrap:wrap;overflow-x:auto;}
.catbtn{background:rgba(255,255,255,.05);border:1px solid var(--bo);padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.catbtn:hover{background:rgba(255,255,255,.1);}
.catbtn.active{background:var(--bl);border-color:var(--bl);color:#fff;}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--hd);padding:10px 12px;font-size:10px;color:var(--mu);text-transform:uppercase;text-align:right;white-space:nowrap;cursor:pointer;letter-spacing:.3px;}
thead th:first-child{text-align:left;}
thead th:hover{color:var(--txt);}
tbody td{padding:9px 12px;font-size:13px;border-top:1px solid rgba(30,42,106,.4);text-align:right;white-space:nowrap;}
tbody td:first-child{text-align:left;font-weight:600;}
tbody tr{cursor:pointer;transition:background .15s;}
tbody tr:hover{background:rgba(255,255,255,.05);}
tbody tr.selected{background:rgba(78,168,255,.15);}
.pos{color:var(--gr);font-weight:600;}.neg{color:var(--re);font-weight:600;}.mu{color:var(--mu);}
.cat{font-size:11px;color:var(--mu);display:block;margin-top:2px;font-weight:400;}
.newspanel{background:linear-gradient(160deg,var(--p1),var(--p2));border:1px solid var(--bo);border-radius:14px;padding:16px;max-height:800px;overflow-y:auto;}
.newspanel h3{font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.newsitem{padding:12px;border-bottom:1px solid rgba(30,42,106,.4);transition:background .15s;}
.newsitem:last-child{border:none;}
.newsitem:hover{background:rgba(255,255,255,.03);}
.newsitem a{color:var(--txt);text-decoration:none;display:block;}
.newsitem .nh{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.4;}
.newsitem .nm{font-size:11px;color:var(--mu);display:flex;gap:12px;flex-wrap:wrap;}
.newsempty{color:var(--mu);font-size:13px;text-align:center;padding:40px 20px;}
.newsload{color:var(--bl);font-size:13px;text-align:center;padding:40px 20px;}
#ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;}
#ov.hn{display:none;}
.bx{background:#0c1035;border:1px solid var(--bo);border-radius:16px;padding:28px;max-width:540px;width:92%;max-height:90vh;overflow-y:auto;}
.bx h2{font-size:17px;margin-bottom:8px;}
.bx p{font-size:13px;color:var(--mu);line-height:1.65;margin-bottom:12px;}
.bx input{width:100%;margin-bottom:8px;padding:10px 12px;}
.bx label{font-size:12px;color:var(--mu);display:block;margin-bottom:4px;margin-top:12px;}
.bxrow{display:flex;gap:10px;margin-top:16px;}
.bxrow button{flex:1;padding:10px;font-size:13px;}
.bg2{background:rgba(46,204,135,.18)!important;border-color:var(--gr)!important;}
.bb{background:rgba(78,168,255,.18)!important;border-color:var(--bl)!important;}
#em{color:var(--re);font-size:12px;min-height:16px;margin-bottom:8px;}
code{background:rgba(255,255,255,.08);padding:2px 5px;border-radius:4px;font-size:11px;}

</style>
</head>
<body>
<div id="ov"><div class="bx">
<h2>AI Supply Chain Settings</h2>
<p>Configure your data sources and API keys.</p>
<label>Google Sheets CSV URL</label>
<input type="text" id="csvUrl" placeholder="https://docs.google.com/spreadsheets/d/e/...output=csv"/>
<label>Finnhub API Key (for news feed)</label>
<input type="text" id="apiKey" placeholder="Your Finnhub API key"/>
<p style="font-size:11px;margin-top:4px;">Get free API key at <a href="https://finnhub.io/register" target="_blank" style="color:var(--bl)">finnhub.io/register</a></p>
<div id="em"></div>
<div class="bxrow">
<button class="bg2" id="btnSave">Save & Connect</button>
<button class="bb" id="btnD">Demo Data</button>
</div></div></div>
<div class="page">
<div class="topbar"><div><h1>🔌 AI Supply Chain</h1><div class="meta" id="upd">-</div></div>
<div class="ctrl">
<input type="text" id="fi" placeholder="Search company..." style="width:160px"/>
<select id="ss"><option value="d1">Sort: 1D%</option><option value="w1">1W%</option><option value="w2">2W%</option><option value="m1">1M%</option><option value="m3">3M%</option></select>
<button id="btnDi">Desc</button><button id="btnR">Refresh</button><button id="btnS">Settings</button>
</div></div>
<div class="cards" id="cards"></div>
<div class="layout">
<div class="tw">
<div class="tb"><h2>All Stocks</h2><span class="mu" id="ts" style="font-size:11px">Click any stock to view news</span></div>
<div class="catbar" id="catbar"></div>
<table><thead><tr>
<th>Company</th><th>1D%</th><th>1W%</th><th>2W%</th><th>1M%</th><th>3M%</th>
</tr></thead><tbody id="tbody"></tbody></table>
</div>
<div class="newspanel" id="newspanel">
<h3><span>📰</span><span id="newsTitle">Latest News</span></h3>
<div id="newsFeed" class="newsempty">Select a stock to view news</div>
</div>
</div></div>

<script>
var DEMO=[
  {cat:"Semiconductors",name:"NVIDIA",tk:"NVDA",d1:0.023,w1:0.045,w2:0.089,m1:0.12,m3:0.35},
  {cat:"Semiconductors",name:"AMD",tk:"AMD",d1:-0.015,w1:0.028,w2:0.052,m1:0.08,m3:0.22},
  {cat:"GPU/AI Chips",name:"Broadcom",tk:"AVGO",d1:-0.008,w1:0.019,w2:0.041,m1:0.072,m3:0.19},
  {cat:"Memory & Storage",name:"Micron",tk:"MU",d1:0.019,w1:0.051,w2:0.094,m1:0.14,m3:0.38},
  {cat:"Cooling/HVAC",name:"Vertiv",tk:"VRT",d1:0.027,w1:0.068,w2:0.12,m1:0.18,m3:0.42},
  {cat:"Server/Computing",name:"Super Micro",tk:"SMCI",d1:0.031,w1:0.074,w2:0.13,m1:0.19,m3:0.45},
];

var gR=[],gSk="d1",gSd="desc",gF="",gCat="All",gU="",gAPIKey="",gSelTicker="";

function pp(v){
  if(v==null||v!==v)return '<span class="mu">-</span>';
  var c=v>0?"pos":v<0?"neg":"mu";
  return '<span class="'+c+'">'+(v*100).toFixed(2)+'%</span>';
}

function render(){
  var rows=gR.slice();
  if(gF){var q=gF.toLowerCase();rows=rows.filter(function(r){return r.name.toLowerCase().indexOf(q)>=0||r.tk.toLowerCase().indexOf(q)>=0;});}
  if(gCat!=="All"){rows=rows.filter(function(r){return r.cat===gCat;});}
  rows.sort(function(a,b){var av=a[gSk]!=null?a[gSk]:-1e18,bv=b[gSk]!=null?b[gSk]:-1e18;return gSd==="desc"?bv-av:av-bv;});

  document.getElementById("tbody").innerHTML=rows.map(function(r){
    var sel=r.tk===gSelTicker?' class="selected"':'';
    return "<tr"+sel+" onclick='loadNews(\""+r.tk+"\",\""+r.name+"\")'><td><div>"+r.name+"</div><span class='cat'>"+r.cat+" • "+r.tk+"</span></td><td>"+pp(r.d1)+"</td><td>"+pp(r.w1)+"</td><td>"+pp(r.w2)+"</td><td>"+pp(r.m1)+"</td><td>"+pp(r.m3)+"</td></tr>";
  }).join("");

  var cats=["All"];
  var seen={};
  gR.forEach(function(r){if(!seen[r.cat]){cats.push(r.cat);seen[r.cat]=1;}});
  document.getElementById("catbar").innerHTML=cats.map(function(c){
    var count=c==="All"?"":" ("+gR.filter(function(r){return r.cat===c;}).length+")";
    return '<button class="catbtn'+(c===gCat?" active":"")+'" onclick="setCat(\''+c.replace(/'/g,"\\'")+'\')">'+ c+count+'</button>';
  }).join("");

  var periods=[{k:"d1",l:"1D"},{k:"w1",l:"1W"},{k:"w2",l:"2W"},{k:"m1",l:"1M"},{k:"m3",l:"3M"}];
  var cardHTML="";
  periods.forEach(function(p){
    var vals=gR.map(function(r){return r[p.k];}).filter(function(v){return v!=null&&v===v;});
    if(!vals.length)return;
    var avg=vals.reduce(function(a,b){return a+b;},0)/vals.length;
    var up=vals.filter(function(v){return v>0;}).length;
    var dn=vals.filter(function(v){return v<0;}).length;
    var c=avg>0?"g":"r";
    cardHTML+='<div class="card '+c+'"><div class="lb">'+p.l+' Avg</div><div class="vl">'+(avg>=0?"+":"")+(avg*100).toFixed(2)+'%</div><div class="sb">↑'+up+' ↓'+dn+'</div></div>';
  });
  document.getElementById("cards").innerHTML=cardHTML;
}

function loadNews(ticker,name){
  gSelTicker=ticker;
  render();
  document.getElementById("newsTitle").textContent="News: "+name+" ("+ticker+")";

  if(!gAPIKey){
    document.getElementById("newsFeed").innerHTML='<div class="newsempty">Add your Finnhub API key in Settings to view news</div>';
    return;
  }

  document.getElementById("newsFeed").innerHTML='<div class="newsload">Loading news...</div>';

  var cleanTicker=ticker.split('.')[0].split(':')[1]||ticker.split('.')[0];
  var now=Math.floor(Date.now()/1000);
  var weekAgo=now-(7*24*60*60);
  var url="https://finnhub.io/api/v1/company-news?symbol="+cleanTicker+"&from="+new Date(weekAgo*1000).toISOString().split('T')[0]+"&to="+new Date(now*1000).toISOString().split('T')[0]+"&token="+gAPIKey;

  fetch(url)
    .then(function(res){return res.json();})
    .then(function(data){
      if(!data||data.length===0){
        document.getElementById("newsFeed").innerHTML='<div class="newsempty">No recent news found for '+ticker+'</div>';
        return;
      }
      var html=data.slice(0,15).map(function(item){
        var date=new Date(item.datetime*1000);
        var timeAgo=getTimeAgo(item.datetime*1000);
        return '<div class="newsitem"><a href="'+item.url+'" target="_blank"><div class="nh">'+item.headline+'</div><div class="nm"><span>'+item.source+'</span><span>'+timeAgo+'</span></div></a></div>';
      }).join("");
      document.getElementById("newsFeed").innerHTML=html;
    })
    .catch(function(err){
      document.getElementById("newsFeed").innerHTML='<div class="newsempty" style="color:var(--re)">Error loading news. Check your API key.</div>';
      console.error("News fetch error:",err);
    });
}

function getTimeAgo(timestamp){
  var sec=Math.floor((Date.now()-timestamp)/1000);
  if(sec<60)return sec+"s ago";
  if(sec<3600)return Math.floor(sec/60)+"m ago";
  if(sec<86400)return Math.floor(sec/3600)+"h ago";
  return Math.floor(sec/86400)+"d ago";
}

function cleanPct(s){
  if(!s||s.trim()==="")return null;
  var bad=["#n/a","#name?","#ref!","#error!","#value!"];
  if(bad.indexOf(s.trim().toLowerCase())>=0)return null;
  var cleaned=s.replace(/[$,\s]/g,"");
  if(cleaned.indexOf("%")>=0)return parseFloat(cleaned)/100;
  var v=parseFloat(cleaned);
  return isNaN(v)?null:v;
}

function parseCSV(txt){
  var t=txt.trim();
  if(!t||t[0]==="<"||t[0]==="{"||t[0]==="(")return null;
  var lines=t.split(/\r?\n/).filter(function(l){return l.trim()&&l.replace(/,/g,"").trim()!=="";});
  if(lines.length<2)return null;
  var hdr=lines[0].split(",").map(function(s){return s.trim().toLowerCase();});
  function fi(k){for(var i=0;i<hdr.length;i++){if(hdr[i].indexOf(k)>=0)return i;}return -1;}
  var icat=fi("cat"),iname=fi("company")||fi("name"),itk=fi("ticker");
  var i1d=fi("1d"),i1w=fi("1w"),i2w=fi("2w"),i1m=fi("1m"),i3m=fi("3m");
  var rows=lines.slice(1).map(function(line){
    var c=line.split(",").map(function(s){return s.trim().replace(/^"|"$/g,"");});
    if(!c[iname]||!c[iname].trim())return null;
    return {
      cat:icat>=0?c[icat]||"Other":"Other",
      name:c[iname],
      tk:itk>=0?c[itk]||"":"",
      d1:i1d>=0?cleanPct(c[i1d]):null,
      w1:i1w>=0?cleanPct(c[i1w]):null,
      w2:i2w>=0?cleanPct(c[i2w]):null,
      m1:i1m>=0?cleanPct(c[i1m]):null,
      m3:i3m>=0?cleanPct(c[i3m]):null
    };
  }).filter(Boolean);
  return rows.length?rows:null;
}

function xget(url,cb){
  var x=new XMLHttpRequest();x.open("GET",url,true);x.timeout=9000;
  x.onreadystatechange=function(){if(x.readyState!==4)return;cb(x.status>=200&&x.status<300?null:"HTTP "+x.status,x.responseText);};
  x.ontimeout=function(){cb("timeout","");};x.onerror=function(){cb("blocked","");};x.send();
}

function loadData(url){
  document.getElementById("ts").textContent="Loading...";
  var cb=url+(url.indexOf("?")>=0?"&":"?")+"_cb="+Date.now();
  var p1="https://corsproxy.io/?"+encodeURIComponent(cb);
  var p2="https://api.allorigins.win/get?url="+encodeURIComponent(cb);
  xget(p1,function(e1,t1){
    if(!e1&&t1){var r=parseCSV(t1);if(r){done(r);return;}}
    xget(p2,function(e2,t2){
      if(!e2&&t2){
        try{var j=JSON.parse(t2);if(j.contents){var r2=parseCSV(j.contents);if(r2){done(r2);return;}}}catch(ex){}
      }
      xget(cb,function(e3,t3){
        if(!e3&&t3){var r3=parseCSV(t3);if(r3){done(r3);return;}}
        document.getElementById("ts").innerHTML='<span style="color:var(--re)">Failed to load CSV</span>';
      });
    });
  });
}

function done(rows){
  gR=rows;
  document.getElementById("upd").textContent="Updated: "+new Date().toLocaleTimeString()+" ("+rows.length+" stocks)";
  document.getElementById("ts").textContent="Click any stock to view news";
  render();
}
function doR(){if(gU)loadData(gU);}

function setCat(c){gCat=c;render();}

document.getElementById("btnSave").onclick=function(){
  var u=document.getElementById("csvUrl").value.trim();
  var k=document.getElementById("apiKey").value.trim();
  if(!u){document.getElementById("em").textContent="Paste your CSV URL first.";return;}
  document.getElementById("em").textContent="";
  gU=u;gAPIKey=k;
  try{localStorage.setItem("aiCSV",u);localStorage.setItem("aiAPIKey",k);}catch(e){}
  document.getElementById("ov").className="hn";
  loadData(u);setInterval(doR,300000);
};
document.getElementById("btnD").onclick=function(){gR=DEMO;document.getElementById("ov").className="hn";document.getElementById("upd").textContent="Demo mode";render();};
document.getElementById("btnS").onclick=function(){document.getElementById("ov").className="";};
document.getElementById("btnDi").onclick=function(){gSd=gSd==="desc"?"asc":"desc";this.textContent=gSd==="desc"?"Desc":"Asc";render();};
document.getElementById("btnR").onclick=doR;
document.getElementById("fi").oninput=function(){gF=this.value;render();};
document.getElementById("ss").onchange=function(){gSk=this.value;render();};

document.body.ondragover=function(e){e.preventDefault();};
document.body.ondrop=function(e){
  e.preventDefault();
  var file=e.dataTransfer.files[0];if(!file)return;
  var rd=new FileReader();
  rd.onload=function(ev){var r=parseCSV(ev.target.result);if(r){gU="";done(r);}else{alert("Could not parse CSV");}};
  rd.readAsText(file);
};

try{
  var sv=localStorage.getItem("aiCSV");if(sv)document.getElementById("csvUrl").value=sv;
  var ak=localStorage.getItem("aiAPIKey");if(ak){document.getElementById("apiKey").value=ak;gAPIKey=ak;}
}catch(e){}
</script>

</body></html>
